<head>
    <link rel="stylesheet" href="https://furryring.neocities.org/onionring.css">
    <link rel="stylesheet" type="text/css" href="https://file.garden/ZrZSgsrYfQXsO7QH/ww/webmasterwebring.css">
    <link rel="stylesheet" href="https://jack-dawlia.neocities.org/page/shrines/portal/aperturewebring/onionring.css">
</head>

<style>
    body {
        overflow: hidden;
    }
    .pattern {
        background-color: transparent;
        border-radius: 30px 0 0 30px;
        opacity: 0.8;
        background-image:  linear-gradient(var(--surface0) 1.8px, transparent 1.8px), linear-gradient(to right, var(--surface0) 1.8px, transparent 1.8px);
        background-size: 36px 36px;
        background-position: 22px 18px;
        border-right: 2px solid var(--surface0);
        animation: pattern 1s infinite linear;
    }
    @keyframes pattern {
        from {
            background-position: 0px 0px;
        }
        to {
            background-position: 36px 36px;
        }
    }

    /* heavenly class name */
    .boykisser {
        border: none;
        filter: drop-shadow(4px 4px 6px var(--pink)) saturate(150%);
        width: 300px;
        height: 100%;
        image-rendering: pixelated;
        object-fit: contain;
        animation: boykisser 1s linear infinite;
        transition: transform 0.75s cubic-bezier(0.34, 3, 0.64, 1);
    }
    .boykisser:hover {
        transform: rotate(-20deg) scale(1.2);
    }

    @keyframes boykisser {
        from {
            filter: drop-shadow(4px 4px 6px var(--pink)) saturate(150%);
        }
        to {
            filter: drop-shadow(4px 4px 6px var(--pink)) saturate(150%) hue-rotate(360deg);
        }
    }

    @keyframes zoom-in {
        from {
            opacity: 0;
            transform: scale(1.2);
            filter: blur(4px);
        }
        to {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
        }
    }

    @keyframes slide-in {
        from {
            opacity: 0;
            transform: translateX(10%);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    #webrings {
        display: none;
    }

    #logo {
        position: absolute;
        bottom: 50%;
        right: 50%;
        opacity: 0.1;
        filter: saturate(0);
        z-index: 1000000;
        visibility: hidden;
    }

    @keyframes logo {
        from {
            visibility: visible;
            filter: saturate(0);
            opacity: 0;
            transform: translate(200%, 50%) scale(0.8) rotateX(-85deg);
        }
        10% {
            transform: translate(50%, 50%) scale(0.8) rotateX(-85deg);
        }
        20% {
            transform: translate(50%, 50%) scale(0.85) rotateX(0deg);
        }
        90% {
            filter: saturate(1) drop-shadow(0 0 12px var(--pink)) saturate(150%);
            opacity: 1;
            bottom: 50%;
            right: 50%;
            transform: translate(50%, 50%) scale(1);
        }
        to {
            opacity: 0;
            transform: translate(50%, 50%) rotateX(90deg);
        }
    }
</style>

<img id="logo" src="/assets/images/branding/logo.svg"/>

<div class="card index-card" style="animation: zoom-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;; padding: 0; opacity: 0;">
    <div class="split" id="main">
        <div class="pattern" style="padding: 20px 10px; flex-grow: 0;">
            <img alt="dancing boykisser cat" class="boykisser" src="/assets/images/boykisser.gif">
        </div>
        <div style="animation: 0.5s slide-in ease forwards; animation-delay: 0.5s; padding: 10px 10px 25px; opacity: 0;">
            <h1 style="color: var(--pink); text-shadow: 0 0 24px var(--pink);">welcome</h1>
            <p style="margin-bottom: 0;">before you enter, please be aware this site <i>may</i> include</p>
            <ul style="margin: 5px;">
                <li>swearing</li>
                <li>music <span style="color: var(--subtext0)">(right click tab to disable)</span></li>
                <li>poor mobile support</li>
                <li>gayness</li>
            </ul>
            <p style="margin-top: 0; margin-bottom: 30px;">do not enter if you're under 13 please!</p>
            <button class="mute" onclick="enter()">enter</button>
            <button class="outlined" onclick="toggleWebrings()" style="padding: 8px 15px;">webrings</button>
        </div>
        <img style="position: absolute; bottom: 20px; right: 25px; width: 200px; opacity: 0.1; filter: saturate(0);" src="/assets/images/branding/logo.svg"/>
    </div>


    <div id="webrings" style="padding: 10px 20px;">
        <button class="outlined" onclick="toggleWebrings()" style="padding: 8px 15px;">< back</button>
        <h3>webrings</h3>
        <div id='furryring'>
            <script type="text/javascript" src="https://furryring.neocities.org/onionring-variables.js"></script>
            <script type="text/javascript" src="https://furryring.neocities.org/onionring-widget.js"></script>
        </div>
        <script src="https://silly.possiblyaxolotl.com/ring/webstring.js"></script>
        <div id="webmasteringbtn"><a href="https://webmasterwebring.netlify.app?olifurz-previous">&lt;</a>
            <a href="https://webmasterwebring.netlify.app"><img src="https://file.garden/ZrZSgsrYfQXsO7QH/ww/btn.png" width="88" height="31"></a>
            <a href="https://webmasterwebring.netlify.app?olifurz-random" style="font-size: 1.5rem;">?</a> <a href="https://webmasterwebring.netlify.app?olifurz-next">&gt;</a>
        </div>
        <div id='aperturewebring'>
            <script type="text/javascript" src="https://jack-dawlia.neocities.org/page/shrines/portal/aperturewebring/onionring-variables.js"></script>
            <script type="text/javascript" src="https://jack-dawlia.neocities.org/page/shrines/portal/aperturewebring/onionring-widget-1.js"></script>
            <noscript>
                This site is part of the <a href="https://jack-dawlia.neocities.org/page/shrines/portal/aperturewebring">Aperture Webring</a>!
            </noscript>
        </div>
        <div>
            <script defer src="https://teethinvitro.neocities.org/webring/linuxring/ring.js" data-icon="tux"></script>
        </div>
        <div>
            <a href="https://ctp-webr.ing/olifurz/previous">&larr;</a
            ><a href="https://ctp-webr.ing/">Catppuccin webring</a>
            <a href="https://ctp-webr.ing/olifurz/next">&rarr;</a>
        </div>
    </div>
</div>

<script>
    let visible = false;
    function toggleWebrings() {
        const main = document.getElementById("main");
        const webrings = document.getElementById("webrings");

        if (visible) {
            main.style.display = "flex";
            webrings.style.display = "none";
            visible = false;
        }
        else {
            main.style.display = "none";
            webrings.style.display = "block";
            visible = true;
        }
    }

    function enter() {
        const logo = document.getElementById("logo");
        logo.style.animation = "logo 2s forwards linear";

        const transition = document.getElementById('transition');
        transition.classList.add('transitionIn');
        playOneShot(sounds.buttonSelect)
        playOneShot(sounds.welcome)

        setTimeout(() => {
            window.location.href = "/home/";
        }, 2100)
    }
</script>
